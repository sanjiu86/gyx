<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人介绍 - 顾玉西</title>
    <style>
      :root {
        --bg: #fafafa;
        --surface: #ffffff;
        --text: #2c2c2c;
        --text-light: #6b6b6b;
        --accent: #3a3a3a;
        --border: #e8e8e8;
        --radius: 10px;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
        --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        --font-sans: "Inter", "PingFang SC", "Microsoft YaHei", "Helvetica Neue",
          sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", "Consolas", "Courier New",
          monospace;
        --max-width: 780px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        color: var(--text);
        line-height: 1.7;
        letter-spacing: 0.015em;
        padding: 0 20px;
      }

      /* ========== 导航栏 ========== */
      .navbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(250, 250, 250, 0.82);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--border);
        padding: 14px 0;
        margin: 0 -20px;
        padding-left: 20px;
        padding-right: 20px;
      }

      .navbar-inner {
        max-width: var(--max-width);
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .nav-logo {
        font-weight: 700;
        font-size: 1.15rem;
        letter-spacing: -0.01em;
        color: var(--text);
        text-decoration: none;
        transition: var(--transition);
      }
      .nav-logo:hover {
        opacity: 0.7;
      }

      .nav-links {
        display: flex;
        list-style: none;
        gap: 28px;
      }
      .nav-links a {
        text-decoration: none;
        color: var(--text-light);
        font-size: 0.92rem;
        font-weight: 500;
        transition: var(--transition);
        position: relative;
        padding-bottom: 2px;
      }
      .nav-links a::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 1.5px;
        background: var(--text);
        transition: var(--transition);
        border-radius: 1px;
      }
      .nav-links a:hover {
        color: var(--text);
      }
      .nav-links a:hover::after {
        width: 100%;
      }

      /* ========== 主容器 ========== */
      .main-container {
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 40px 0 60px;
      }

      /* ========== 英雄区 / 头部 ========== */
      .hero {
        display: flex;
        align-items: center;
        gap: 36px;
        padding: 50px 0 40px;
        flex-wrap: wrap;
      }

      .hero-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        background: #e0e0e0;
        flex-shrink: 0;
        box-shadow: var(--shadow-sm);
        border: 3px solid #fff;
        /* 占位背景 - 可替换为真实图片 */
        background: linear-gradient(135deg, #d4d4d4 0%, #c0c0c0 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.2rem;
        color: #999;
        user-select: none;
      }

      .hero-info h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 6px;
        color: var(--text);
      }
      .hero-info .tagline {
        font-size: 1rem;
        color: var(--text-light);
        font-weight: 400;
        margin-bottom: 8px;
      }
      .hero-info .location {
        font-size: 0.88rem;
        color: #999;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .hero-info .location svg {
        width: 15px;
        height: 15px;
        stroke: #999;
      }

      /* ========== 通用区块 ========== */
      .section {
        margin-bottom: 48px;
      }
      .section-title {
        font-size: 1.25rem;
        font-weight: 650;
        letter-spacing: -0.01em;
        margin-bottom: 20px;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-title::before {
        content: "";
        display: inline-block;
        width: 5px;
        height: 20px;
        background: var(--accent);
        border-radius: 3px;
        flex-shrink: 0;
      }

      /* 卡片 */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px 28px;
        box-shadow: var(--shadow-sm);
        transition: var(--transition);
      }
      .card:hover {
        box-shadow: var(--shadow-md);
      }
      .card p {
        color: var(--text-light);
        font-size: 0.95rem;
        line-height: 1.75;
      }

      /* ========== 技能标签 ========== */
      .skills-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .skill-tag {
        display: inline-block;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 7px 16px;
        font-size: 0.88rem;
        font-weight: 500;
        color: var(--text);
        transition: var(--transition);
        cursor: default;
        letter-spacing: 0.01em;
        box-shadow: var(--shadow-sm);
      }
      .skill-tag:hover {
        border-color: #b0b0b0;
        background: #f5f5f5;
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      /* ========== 经历列表 ========== */
      .experience-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .experience-item {
        display: flex;
        gap: 20px;
        align-items: flex-start;
        padding: 18px 22px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        transition: var(--transition);
      }
      .experience-item:hover {
        box-shadow: var(--shadow-md);
      }
      .experience-date {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: #999;
        min-width: 90px;
        text-align: right;
        padding-top: 3px;
        letter-spacing: 0.03em;
        flex-shrink: 0;
      }
      .experience-content h3 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 3px;
        color: var(--text);
        letter-spacing: -0.01em;
      }
      .experience-content .subtitle {
        font-size: 0.85rem;
        color: var(--text-light);
        margin-bottom: 4px;
      }
      .experience-content p {
        font-size: 0.88rem;
        color: #777;
        line-height: 1.6;
        margin: 0;
      }

      /* ========== 联系链接 ========== */
      .contact-links {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }
      .contact-link {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        text-decoration: none;
        color: var(--text);
        font-size: 0.92rem;
        font-weight: 500;
        padding: 10px 18px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        transition: var(--transition);
        box-shadow: var(--shadow-sm);
      }
      .contact-link:hover {
        background: #f5f5f5;
        border-color: #bbb;
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
      }
      .contact-link svg {
        width: 17px;
        height: 17px;
        flex-shrink: 0;
      }

      /* ========== 页脚 ========== */
      .footer {
        text-align: center;
        padding: 30px 0 20px;
        font-size: 0.8rem;
        color: #b0b0b0;
        border-top: 1px solid var(--border);
        margin-top: 10px;
        letter-spacing: 0.02em;
      }

      /* ========== 响应式 ========== */
      @media (max-width: 640px) {
        .hero {
          flex-direction: column;
          align-items: flex-start;
          gap: 18px;
          padding: 30px 0 24px;
        }
        .hero-avatar {
          width: 80px;
          height: 80px;
          font-size: 1.6rem;
        }
        .hero-info h1 {
          font-size: 1.6rem;
        }
        .nav-links {
          gap: 16px;
        }
        .nav-links a {
          font-size: 0.82rem;
        }
        .experience-item {
          flex-direction: column;
          gap: 6px;
        }
        .experience-date {
          text-align: left;
          min-width: auto;
        }
        .card {
          padding: 18px 20px;
        }
        .section-title {
          font-size: 1.1rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- ==================== 导航栏 ==================== -->
    <nav class="navbar">

        <ul class="nav-links">
          <li><a href="#about">关于</a></li>

      <!-- 联系 -->
      <section class="section" id="contact">

      </section>
    </main>

    <!-- ==================== 页脚 ==================== -->
    <footer class="footer">
      <p>© 2026 </p>
    </footer>
  </body>
</html>
